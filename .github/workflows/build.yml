
name: language-checks
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest fastapi pydantic httpx
      - name: Compile Python modules
        run: python -m compileall -q -x '(^|/)(\.git|executor/target)(/|$)' .
      - name: Run simulator tests
        run: PYTHONPATH=. pytest -q tests

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Check Rust formatting
        run: cargo fmt --manifest-path executor/Cargo.toml -- --check
      - name: Check Rust executor
        run: cargo check --manifest-path executor/Cargo.toml

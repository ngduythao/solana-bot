services:
  orchestrator:
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: '2.0', memory: 2g }
    healthcheck:
      test: ["CMD-SHELL","curl -fsS http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  snapshot_collector_v2:
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: '1.0', memory: 512m }
    healthcheck:
      test: ["CMD","python","-c","import os;exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 5

  sdk_helper:
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: '0.5', memory: 256m }

  node_tools:
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: '0.5', memory: 256m }


# Common hardening options (included in all solbot units)
NoNewPrivileges=yes
PrivateTmp=yes
ProtectSystem=full
ProtectHome=yes
MemoryDenyWriteExecute=yes
LockPersonality=yes
RestrictRealtime=yes
RestrictSUIDSGID=yes
SystemCallArchitectures=native
# Resource limits
LimitNOFILE=65536
# Auto-restart policy
Restart=always
RestartSec=2
